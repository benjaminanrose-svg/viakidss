spring.application.name=viakids-backend
server.port=8081

# ============================================================
# Neon PostgreSQL Database (Production)
# ============================================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://ep-noisy-dawn-aqywjgxs-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require}
spring.datasource.username=${DATABASE_USERNAME:neondb_owner}
spring.datasource.password=${DATABASE_PASSWORD:npg_kpHPQu6S1hOT}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${JWT_SECRET:viaKidsSecretKey2026SuperSecureLongKeyForHS512SignatureAlgorithmMinimum512BitsRequired}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
app.cors.origins=${CORS_ORIGINS:http://localhost:5173,https://via-kids-capstone.vercel.app}

# Initialize seed data on first run
spring.jpa.defer-datasource-initialization=true

# ============================================================
# RabbitMQ (habilitado — requiere contenedor Docker)
# ============================================================
app.rabbitmq.enabled=true
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# STOMP broker relay (RabbitMQ STOMP plugin en puerto 61613)
spring.rabbitmq.stomp-port=61613

